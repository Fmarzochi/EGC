name: ClusterFuzzLite cron tasks

on:
  workflow_dispatch:
  # schedule disabled (EGC#910): ClusterFuzzLite is dead-locked upstream for
  # JavaScript (config_utils.py rejects `none` while compile requires it), so the
  # weekly cron never goes green and only masks real failures. Manual runs via
  # workflow_dispatch remain; re-enable once the upstream contradiction is fixed.
  # schedule:
  #   - cron: '0 7 * * 0'

permissions: {}

jobs:
  Pruning:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    concurrency:
      group: ${{ github.workflow }}
      cancel-in-progress: false
    steps:
      - name: Build Fuzzers
        id: build
        uses: google/clusterfuzzlite/actions/build_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1
        with:
          language: javascript
          sanitizer: address
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Fuzzers
        id: run
        uses: google/clusterfuzzlite/actions/run_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: 600
          mode: prune
          sanitizer: address
          output-sarif: true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          sarif_file: cifuzz-sarif/results.sarif
